<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — MEDI-W Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.460.0/font/lucide.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <script>document.documentElement.classList.add("preload");if(localStorage.getItem("sidebar-collapsed")==="true"){document.documentElement.classList.add("sidebar-collapsed")}</script>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-secondary)}
    .error-page{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
    .error-code{font-family:var(--font-mono);font-size:80px;font-weight:700;color:var(--border)}
    .error-title{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;color:var(--fg-primary)}
    .error-desc{font-family:'Inter',sans-serif;font-size:14px;color:var(--fg-muted)}
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <div class="error-title">페이지를 찾을 수 없습니다</div>
    <div class="error-desc">요청하신 페이지가 존재하지 않거나 이동되었습니다</div>
    <a href="dashboard.html" class="btn btn-primary" style="margin-top:8px"><i class="icon-arrow-left" style="font-size:16px"></i> 홈으로 돌아가기</a>
  </div>
</body>
</html>
