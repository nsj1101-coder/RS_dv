<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediW Руководство по демонстрации — Для руководителя</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'Inter','Noto Sans KR',sans-serif;background:#0a0e1a;color:#fff;-webkit-font-smoothing:antialiased;}

    /* ===== LAYOUT ===== */
    .app{display:flex;height:100vh;overflow:hidden;}

    /* ===== SIDEBAR ===== */
    .sidebar{width:340px;min-width:340px;background:#0f1629;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-header{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);}
    .sidebar-header h1{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:.25rem;}
    .sidebar-header p{font-size:.75rem;color:rgba(255,255,255,.4);line-height:1.4;}
    .sidebar-nav{flex:1;overflow-y:auto;padding:.75rem;}
    .sidebar-nav::-webkit-scrollbar{width:4px;}
    .sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}

    .scenario-group{margin-bottom:.5rem;}
    .scenario-title{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);padding:.5rem .75rem .25rem;display:flex;align-items:center;gap:.5rem;}
    .scenario-title::before{content:'';width:8px;height:2px;background:rgba(51,145,255,.5);border-radius:1px;}

    .step-btn{display:flex;align-items:flex-start;gap:.75rem;width:100%;padding:.625rem .75rem;border:none;background:transparent;color:rgba(255,255,255,.5);text-align:left;cursor:pointer;border-radius:.5rem;transition:all .2s;font-family:inherit;font-size:.8rem;line-height:1.4;}
    .step-btn:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.7);}
    .step-btn.active{background:rgba(51,145,255,.1);color:#fff;border:1px solid rgba(51,145,255,.2);}
    .step-num{min-width:1.5rem;height:1.5rem;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;transition:all .2s;}
    .step-btn.active .step-num{background:linear-gradient(135deg,#3391ff,#8eceff);color:#0a0e1a;}
    .step-btn.done .step-num{background:rgba(52,211,153,.15);color:#34d399;}
    .step-btn.done .step-num::after{content:'✓';}
    .step-info{flex:1;}
    .step-name{font-weight:600;margin-bottom:.125rem;}
    .step-page{font-size:.65rem;color:rgba(255,255,255,.25);font-family:'SF Mono','Fira Code',monospace;}

    /* ===== MAIN ===== */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    /* Top bar */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;background:#0f1629;border-bottom:1px solid rgba(255,255,255,.06);min-height:3.5rem;}
    .topbar-left{display:flex;align-items:center;gap:1rem;}
    .nav-arrows{display:flex;gap:.25rem;}
    .nav-arrows button{width:2rem;height:2rem;border-radius:.375rem;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:1rem;}
    .nav-arrows button:hover:not(:disabled){background:rgba(255,255,255,.05);color:#fff;border-color:rgba(255,255,255,.2);}
    .nav-arrows button:disabled{opacity:.3;cursor:not-allowed;}
    .step-counter{font-size:.8rem;color:rgba(255,255,255,.4);font-weight:500;}
    .topbar-right{display:flex;align-items:center;gap:.75rem;}
    .timer-badge{font-size:.7rem;padding:.25rem .625rem;border-radius:1rem;background:rgba(51,145,255,.1);color:#3391ff;border:1px solid rgba(51,145,255,.15);font-weight:500;}
    .fullscreen-btn{width:2rem;height:2rem;border-radius:.375rem;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.85rem;}
    .fullscreen-btn:hover{background:rgba(255,255,255,.05);color:#fff;}

    /* Content area */
    .content{flex:1;display:flex;overflow:hidden;}

    /* Preview panel */
    .preview-panel{flex:1;position:relative;background:#080b14;overflow:hidden;}
    .iframe-wrap{width:100%;height:100%;position:relative;}
    .iframe-wrap iframe{width:100%;height:100%;border:none;background:#0a0e1a;}

    /* Hotspot overlays */
    .hotspot-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
    .hotspot{position:absolute;pointer-events:auto;cursor:pointer;z-index:11;}
    .hotspot-ring{width:48px;height:48px;border-radius:50%;border:3px solid #ff4757;background:rgba(255,71,87,.15);display:flex;align-items:center;justify-content:center;animation:hotspot-pulse 2s ease-in-out infinite;position:relative;}
    .hotspot-ring::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#ff4757;}
    @keyframes hotspot-pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.6;}}
    .hotspot-label{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(255,71,87,.95);color:#fff;font-size:.7rem;font-weight:600;padding:.25rem .625rem;border-radius:.25rem;backdrop-filter:blur(8px);}
    .hotspot-label::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:5px solid rgba(255,71,87,.95);}

    /* Script panel */
    .script-panel{width:380px;min-width:380px;background:#0f1629;border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;}
    .script-header{padding:1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:.5rem;}
    .script-header h3{font-size:.85rem;font-weight:600;}
    .script-icon{font-size:1rem;}
    .script-body{flex:1;overflow-y:auto;padding:1.25rem;}
    .script-body::-webkit-scrollbar{width:4px;}
    .script-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}

    .script-section{margin-bottom:1.5rem;}
    .script-section:last-child{margin-bottom:0;}
    .script-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.3);margin-bottom:.5rem;display:flex;align-items:center;gap:.375rem;}
    .script-label svg{width:12px;height:12px;opacity:.5;}

    .talk-bubble{background:rgba(51,145,255,.06);border:1px solid rgba(51,145,255,.1);border-radius:.625rem;padding:.875rem 1rem;font-size:.825rem;line-height:1.7;color:rgba(255,255,255,.85);position:relative;}
    .talk-bubble::before{content:'"';position:absolute;top:-.1rem;left:.5rem;font-size:1.5rem;color:rgba(51,145,255,.3);font-family:Georgia,serif;}

    .action-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;}
    .action-item{display:flex;align-items:flex-start;gap:.5rem;padding:.5rem .75rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:.5rem;font-size:.8rem;color:rgba(255,255,255,.7);line-height:1.5;}
    .action-num{min-width:1.25rem;height:1.25rem;border-radius:50%;background:rgba(255,71,87,.12);color:#ff4757;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;margin-top:.1rem;}
    .action-item .click-badge{display:inline-flex;align-items:center;gap:.25rem;background:rgba(255,71,87,.1);color:#ff4757;font-size:.65rem;font-weight:600;padding:.125rem .375rem;border-radius:.25rem;white-space:nowrap;}
    .action-item .click-badge::before{content:'👆';}

    .tip-box{background:rgba(250,204,21,.04);border:1px solid rgba(250,204,21,.1);border-radius:.5rem;padding:.625rem .875rem;font-size:.75rem;color:rgba(250,204,21,.8);line-height:1.5;display:flex;align-items:flex-start;gap:.5rem;}
    .tip-box::before{content:'💡';font-size:.85rem;}

    .page-info{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:.5rem;padding:.625rem .875rem;}
    .page-info-row{display:flex;align-items:center;justify-content:space-between;font-size:.75rem;padding:.25rem 0;}
    .page-info-label{color:rgba(255,255,255,.35);}
    .page-info-value{color:rgba(255,255,255,.7);font-family:'SF Mono','Fira Code',monospace;font-size:.7rem;}
    .page-info-value a{color:#3391ff;text-decoration:none;}
    .page-info-value a:hover{text-decoration:underline;}

    /* Flow connector arrows */
    .flow-next{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem;margin-top:1rem;background:rgba(52,211,153,.04);border:1px dashed rgba(52,211,153,.15);border-radius:.5rem;font-size:.75rem;color:rgba(52,211,153,.7);cursor:pointer;transition:all .2s;}
    .flow-next:hover{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.3);}
    .flow-next svg{width:16px;height:16px;}

    /* Overview step special styling */
    .overview-content{padding:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,rgba(51,145,255,.03),transparent 60%);}
    .overview-flow{max-width:900px;width:100%;}
    .flow-diagram{display:flex;flex-direction:column;gap:1.5rem;}
    .flow-row{display:flex;align-items:center;gap:1rem;justify-content:center;flex-wrap:wrap;}
    .flow-node{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:.75rem;padding:.875rem 1.25rem;font-size:.8rem;color:rgba(255,255,255,.7);text-align:center;min-width:140px;transition:all .3s;cursor:pointer;}
    .flow-node:hover{background:rgba(51,145,255,.08);border-color:rgba(51,145,255,.25);color:#fff;transform:translateY(-2px);}
    .flow-node.highlight{background:rgba(51,145,255,.1);border-color:rgba(51,145,255,.3);color:#fff;}
    .flow-node-label{font-weight:600;margin-bottom:.25rem;}
    .flow-node-file{font-size:.6rem;color:rgba(255,255,255,.25);font-family:monospace;}
    .flow-arrow{color:rgba(255,255,255,.15);font-size:1.25rem;}
    .flow-section-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(51,145,255,.5);text-align:center;margin-bottom:.5rem;}

    /* Responsive */
    @media(max-width:1200px){
      .script-panel{width:320px;min-width:320px;}
      .sidebar{width:280px;min-width:280px;}
    }

    /* Presentation mode */
    .app.presentation .sidebar{display:none;}
    .app.presentation .script-panel{display:none;}
    .app.presentation .topbar{position:absolute;top:0;left:0;right:0;z-index:20;background:rgba(15,22,41,.9);backdrop-filter:blur(12px);}
    .app.presentation .content{padding-top:3.5rem;}

    /* Print */
    @media print{
      .sidebar,.topbar,.hotspot-layer{display:none;}
      .script-panel{border:none;page-break-inside:avoid;}
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Руководство по демонстрации MediW</h1>
      <p>Демонстрация для руководителя клиента — всего 15 этапов</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="nav-arrows">
          <button id="prevBtn" onclick="goStep(currentStep-1)" title="Назад">‹</button>
          <button id="nextBtn" onclick="goStep(currentStep+1)" title="Далее">›</button>
        </div>
        <span class="step-counter" id="stepCounter">1 / 15</span>
      </div>
      <div class="topbar-right">
        <span class="timer-badge" id="timerBadge">Расчётное время демонстрации: ~12 мин</span>
        <button class="fullscreen-btn" onclick="togglePresentation()" title="Режим презентации">⛶</button>
      </div>
    </div>
    <div class="content">
      <!-- PREVIEW -->
      <div class="preview-panel" id="previewPanel">
        <div class="iframe-wrap" id="iframeWrap">
          <iframe id="previewFrame" src="about:blank"></iframe>
          <div class="hotspot-layer" id="hotspotLayer"></div>
        </div>
        <div class="overview-content" id="overviewContent" style="display:none;"></div>
      </div>
      <!-- SCRIPT -->
      <div class="script-panel">
        <div class="script-header">
          <span class="script-icon">🎙️</span>
          <h3>Сценарий и действия</h3>
        </div>
        <div class="script-body" id="scriptBody"></div>
      </div>
    </div>
  </main>
</div>

<script>
// ===== DEMO STEPS DATA =====
const steps = [
  // ===== OVERVIEW =====
  {
    id: 'overview',
    scenario: 'Начало',
    name: 'Обзор процесса демонстрации',
    page: '',
    type: 'overview',
    script: `Здравствуйте, позвольте продемонстрировать вам платформу MediW.\n\nСегодняшняя демонстрация состоит из 5 основных сценариев:\n\n1️⃣ Лендинг — первое впечатление о платформе\n2️⃣ Регистрация — процесс регистрации для 3 типов пользователей\n3️⃣ Вход → Панель управления — основной пользовательский опыт\n4️⃣ Управление пациентами — рабочий процесс приёма, списка и деталей\n5️⃣ Поиск больниц · Администрирование — поиск больниц и функции администратора\n\nОбщее время — примерно 12 минут.`,
    actions: [],
    tips: 'Нажимайте на список этапов слева или используйте стрелки вверху для навигации. Также можно использовать клавиши ← → на клавиатуре.',
    hotspots: [],
    overviewHtml: `
      <div class="overview-flow">
        <div style="text-align:center;margin-bottom:2.5rem;">
          <div style="display:inline-flex;align-items:center;gap:.75rem;background:rgba(51,145,255,.08);border:1px solid rgba(51,145,255,.15);border-radius:1rem;padding:.75rem 1.5rem;">
            <span style="font-size:1.5rem;">🎯</span>
            <div style="text-align:left;">
              <div style="font-size:1rem;font-weight:700;">Руководство по демонстрации MediW</div>
              <div style="font-size:.75rem;color:rgba(255,255,255,.5);">Всего 15 этапов · 5 сценариев · ~12 мин</div>
            </div>
          </div>
        </div>
        <div class="flow-diagram">
          <div><div class="flow-section-title">Сценарий 1 — Представление сервиса</div>
          <div class="flow-row">
            <div class="flow-node highlight" onclick="goStep(1)"><div class="flow-node-label">🏠 Лендинг</div><div class="flow-node-file">index.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(2)"><div class="flow-node-label">📖 Страница «О нас»</div><div class="flow-node-file">index2.html</div></div>
          </div></div>
          <div><div class="flow-section-title">Сценарий 2 — Регистрация</div>
          <div class="flow-row">
            <div class="flow-node" onclick="goStep(3)"><div class="flow-node-label">📝 Регистрация (единая форма)</div><div class="flow-node-file">signup.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(4)"><div class="flow-node-label">✅ Регистрация завершена</div><div class="flow-node-file">signup-success.html</div></div>
          </div></div>
          <div><div class="flow-section-title">Сценарий 3 — Вход · Панель управления</div>
          <div class="flow-row">
            <div class="flow-node" onclick="goStep(5)"><div class="flow-node-label">🔑 Страница входа</div><div class="flow-node-file">login.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(6)"><div class="flow-node-label">📊 Панель управления</div><div class="flow-node-file">dashboard.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(7)"><div class="flow-node-label">👤 Мой профиль</div><div class="flow-node-file">profile.html</div></div>
          </div></div>
          <div><div class="flow-section-title">Сценарий 4 — Управление пациентами</div>
          <div class="flow-row">
            <div class="flow-node" onclick="goStep(8)"><div class="flow-node-label">📋 Список пациентов</div><div class="flow-node-file">patient-list.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(9)"><div class="flow-node-label">➕ Приём пациента</div><div class="flow-node-file">patient-intake.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(10)"><div class="flow-node-label">🔍 Информация о пациенте</div><div class="flow-node-file">patient-detail.html</div></div>
          </div></div>
          <div><div class="flow-section-title">Сценарий 5 — Больницы · Администрирование</div>
          <div class="flow-row">
            <div class="flow-node" onclick="goStep(11)"><div class="flow-node-label">🏥 Поиск больниц</div><div class="flow-node-file">hospitals.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(12)"><div class="flow-node-label">🏥 Информация о больнице</div><div class="flow-node-file">hospital-detail.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(13)"><div class="flow-node-label">⚙️ Панель администратора</div><div class="flow-node-file">admin.html</div></div>
            <span class="flow-arrow">→</span>
            <div class="flow-node" onclick="goStep(14)"><div class="flow-node-label">🏥 Форма регистрации больницы</div><div class="flow-node-file">hospital-register.html</div></div>
          </div></div>
        </div>
      </div>`
  },

  // ===== Сценарий 1: Представление сервиса =====
  {
    id: 'landing',
    scenario: 'Представление сервиса',
    name: 'Лендинг',
    page: 'index.html',
    script: `Это главная страница MediW.\n\n«MediW — это глобальная платформа-хаб для медицинского туризма. Она объединяет зарубежных врачей, больницы и агентства на одной платформе.»\n\nВверху можно переключать тёмную/светлую тему, поддерживается 5 языков. При прокрутке вниз можно увидеть ключевые ценности и функции платформы.`,
    actions: [
      'Медленно прокрутите страницу, показывая общую структуру',
      '<span class="click-badge">Программы</span> — нажмите для перехода к списку программ стажировок',
      '<span class="click-badge">Начать</span> — нажмите для перехода на страницу регистрации',
    ],
    tips: 'При прокрутке делайте паузы и объясняйте каждую секцию. Не прокручивайте слишком быстро.',
    hotspots: [
      { x: '92%', y: '1.5rem', label: 'Кнопка «Начать»' },
    ]
  },
  {
    id: 'intro',
    scenario: 'Представление сервиса',
    name: 'Страница «О нас»',
    page: 'index2.html',
    script: `Страница подробного описания платформы.\n\n«На этой странице подробно объясняется, какую проблему решает MediW и какую ценность предоставляет каждому типу пользователей (врачи, больницы, агентства).»\n\nС помощью CTA-кнопки внизу можно сразу перейти к регистрации.`,
    actions: [
      'Прокрутите страницу и прочитайте ключевое ценностное предложение',
      '<span class="click-badge">Бесплатная регистрация</span> — акцентируйте внимание на кнопке',
      'Покажите связь с index.html через ссылку «Главная страница»',
    ],
    tips: 'Эта страница отвечает на вопрос «Почему MediW?». Делайте акцент на ценностном предложении.',
    hotspots: []
  },

  // ===== Сценарий 2: Регистрация =====
  {
    id: 'signup',
    scenario: 'Регистрация',
    name: 'Регистрация (единая форма)',
    page: 'signup.html',
    script: `Страница регистрации.\n\n«Это компактная форма регистрации из 4 секций на одной странице. Сверху вниз: основная информация, место жительства и гражданство, тип аккаунта, согласие с условиями.»\n\nОсобенно важен выбор типа аккаунта — можно выбрать один из трёх: врач/медицинский специалист, больница/медицинское учреждение, агентство медицинского туризма. Гражданство и страну проживания можно выбрать через модальное окно с поиском.`,

// ===== STATE =====
let currentStep = 0;

// ===== BUILD SIDEBAR =====
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  let lastScenario = '';
  steps.forEach((step, i) => {
    if (step.scenario !== lastScenario) {
      lastScenario = step.scenario;
      html += `<div class="scenario-group"><div class="scenario-title">${step.scenario}</div>`;
    }
    html += `<button class="step-btn" data-step="${i}" onclick="goStep(${i})">
      <span class="step-num">${i}</span>
      <div class="step-info">
        <div class="step-name">${step.name}</div>
        ${step.page ? `<div class="step-page">${step.page}</div>` : ''}
      </div>
    </button>`;
    // Close group if next is different or last
    if (i === steps.length - 1 || steps[i + 1].scenario !== step.scenario) {
      html += `</div>`;
    }
  });
  nav.innerHTML = html;
}

// ===== GO TO STEP =====
function goStep(idx) {
  if (idx < 0 || idx >= steps.length) return;

  // Mark previous as done
  if (currentStep < idx) {
    for (let i = currentStep; i < idx; i++) {
      const btn = document.querySelector(`.step-btn[data-step="${i}"]`);
      if (btn) btn.classList.add('done');
    }
  }

  currentStep = idx;
  const step = steps[idx];

  // Update sidebar active
  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`.step-btn[data-step="${idx}"]`);
  if (activeBtn) {
    activeBtn.classList.add('active');
    activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Update counter
  document.getElementById('stepCounter').textContent = `${idx} / ${steps.length - 1}`;

  // Update nav buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === steps.length - 1;

  // Update preview
  const iframe = document.getElementById('previewFrame');
  const iframeWrap = document.getElementById('iframeWrap');
  const overviewContent = document.getElementById('overviewContent');

  if (step.type === 'overview') {
    iframeWrap.style.display = 'none';
    overviewContent.style.display = 'flex';
    overviewContent.innerHTML = step.overviewHtml || '';
  } else {
    iframeWrap.style.display = 'block';
    overviewContent.style.display = 'none';
    iframe.src = step.page;
  }

  // Update hotspots
  updateHotspots(step.hotspots || []);

  // Update script panel
  updateScript(step);
}

// ===== HOTSPOTS =====
function updateHotspots(hotspots) {
  const layer = document.getElementById('hotspotLayer');
  layer.innerHTML = hotspots.map(h => `
    <div class="hotspot" style="left:${h.x};top:${h.y};transform:translate(-50%,-50%);">
      <div class="hotspot-ring"></div>
      <div class="hotspot-label">${h.label}</div>
    </div>
  `).join('');
}

// ===== SCRIPT PANEL =====

  const body = document.getElementById('scriptBody');
  let html = '';

  // Page info

    html += `<div class="script-section">

        <div class="page-info-row"><span class="page-info-label">Файл</span><span class="page-info-value"><a href="${step.page}" target="_blank">${step.page}</a></span></div>

    html += `<div class="script-section">
      <div class="script-label"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11 5.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1z"/></svg> Руководство к действию (сделайте это)</div>
      <ul class="action-list">${step.actions.map((a, i) => `
        <li class="action-item"><span class="action-num">${i + 1}</span><span>${a}</span></li>
      `).join('')}</ul>
    </div>`;
  }

  // Tips
  if (step.tips) {
    html += `<div class="script-section">
      <div class="script-label">Совет</div>
      <div class="tip-box">${step.tips}</div>
    </div>`;
  }

  // Next step button
  if (currentStep < steps.length - 1) {
    const next = steps[currentStep + 1];
    html += `<div class="flow-next" onclick="goStep(${currentStep + 1})">
      Далее: ${next.name}
      <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg>
    </div>`;
  }

  body.innerHTML = html;
}

// ===== PRESENTATION MODE =====
function togglePresentation() {
  document.getElementById('app').classList.toggle('presentation');
}

// ===== KEYBOARD NAV =====
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    goStep(currentStep + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    goStep(currentStep - 1);
  } else if (e.key === 'Escape') {
    document.getElementById('app').classList.remove('presentation');
  } else if (e.key === 'f' || e.key === 'F') {
    if (!e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      togglePresentation();
    }
  }
});

// ===== INIT =====
buildSidebar();
goStep(0);
</script>
</body>
</html>
