<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — MEDI-W Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.460.0/font/lucide.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <script>document.documentElement.classList.add("preload");if(localStorage.getItem("sidebar-collapsed")==="true"){document.documentElement.classList.add("sidebar-collapsed")}</script>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-secondary)}
    .error-page{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
    .error-icon{width:64px;height:64px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center}
    .error-title{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;color:var(--fg-primary)}
    .error-desc{font-family:'Inter',sans-serif;font-size:14px;color:var(--fg-muted);text-align:center;line-height:1.6}
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-icon"><i class="icon-lock" style="font-size:28px;color:var(--accent)"></i></div>
    <div class="error-title">접근 권한이 없습니다</div>
    <div class="error-desc">이 페이지에 접근할 권한이 없습니다.<br>관리자에게 문의하세요.</div>
    <a href="dashboard.html" class="btn btn-primary" style="margin-top:8px"><i class="icon-arrow-left" style="font-size:16px"></i> 대시보드로 돌아가기</a>
  </div>
</body>
</html>
