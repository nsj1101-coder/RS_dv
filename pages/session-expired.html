<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세션 만료 — MEDI-W Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.460.0/font/lucide.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <script>document.documentElement.classList.add("preload");if(localStorage.getItem("sidebar-collapsed")==="true"){document.documentElement.classList.add("sidebar-collapsed")}</script>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-secondary)}
    .error-page{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
    .error-icon{width:64px;height:64px;border-radius:50%;background:#FFF3E0;display:flex;align-items:center;justify-content:center}
    .error-title{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;color:var(--fg-primary)}
    .error-desc{font-family:'Inter',sans-serif;font-size:14px;color:var(--fg-muted);text-align:center;line-height:1.6}
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-icon"><i class="icon-clock" style="font-size:28px;color:var(--warning)"></i></div>
    <div class="error-title">세션이 만료되었습니다</div>
    <div class="error-desc">보안을 위해 일정 시간 미활동 시 자동 로그아웃됩니다.<br>다시 로그인해주세요.</div>
    <a href="login.html" class="btn btn-primary" style="margin-top:8px"><i class="icon-log-in" style="font-size:16px"></i> 다시 로그인</a>
  </div>
</body>
</html>
