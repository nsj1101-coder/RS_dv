<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>병원 상세 - MediW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;background:#f5f7fa;color:#1a1a2e;min-height:100vh;}
    .app{display:flex;height:100vh;overflow:hidden;}

    /* Sidebar */
    .sidebar{width:240px;background:#fff;border-right:1px solid #e8ecf1;display:flex;flex-direction:column;flex-shrink:0;}
    .sidebar-logo{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:.625rem;border-bottom:1px solid #e8ecf1;}
    .sidebar-logo-icon{width:2rem;height:2rem;border-radius:.5rem;background:linear-gradient(135deg,#3391ff,#8eceff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.875rem;}
    .sidebar-logo-text{font-size:1.125rem;font-weight:700;color:#1a1a2e;}
    .user-card{margin:1rem 1rem 0;padding:1rem;border:1px solid #e8ecf1;border-radius:.75rem;display:flex;align-items:center;gap:.75rem;}
    .user-avatar{width:2.5rem;height:2.5rem;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#93c5fd);display:flex;align-items:center;justify-content:center;}
    .user-avatar svg{width:1.25rem;height:1.25rem;color:#2563eb;}
    .user-name{font-size:.875rem;font-weight:600;color:#1a1a2e;}
    .user-role-label{font-size:.75rem;color:#3391ff;font-weight:500;}
    .type-switcher{display:flex;gap:.25rem;margin:1rem 1rem 0;padding:.25rem;background:#f0f4f8;border-radius:.5rem;}
    .type-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem;padding:.5rem .25rem;border:none;border-radius:.375rem;background:transparent;cursor:pointer;transition:all .2s;font-size:.625rem;font-weight:500;color:#999;font-family:inherit;}
    .type-btn svg{width:1.125rem;height:1.125rem;color:#999;transition:color .2s;}
    .type-btn:hover{background:#e2e8f0;}
    .type-btn.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);color:#3391ff;}
    .type-btn.active svg{color:#3391ff;}
    .nav-menu{flex:1;padding:1rem 0;margin-top:.5rem;}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.5rem;cursor:pointer;transition:all .15s;color:#8896a6;font-size:.875rem;font-weight:500;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#f5f7fa;color:#1a1a2e;}
    .nav-item.active{background:rgba(51,145,255,.06);color:#3391ff;border-left-color:#3391ff;font-weight:600;}
    .nav-item svg{width:1.25rem;height:1.25rem;flex-shrink:0;}
    .sidebar-footer{padding:1rem 1.5rem;border-top:1px solid #e8ecf1;}
    .logout-btn{display:flex;align-items:center;gap:.75rem;width:100%;padding:.625rem 0;border:none;background:none;cursor:pointer;color:#8896a6;font-size:.875rem;font-weight:500;transition:color .15s;font-family:inherit;}
    .logout-btn:hover{color:#e74c3c;}
    .logout-btn svg{width:1.25rem;height:1.25rem;}

    /* Main */
    .main{flex:1;overflow-y:auto;padding:0;background:#fff;}
    .main-inner{max-width:960px;margin:0 auto;padding:2rem 2rem 4rem;}

    /* Back link */
    .back-link{display:inline-flex;align-items:center;gap:.375rem;font-size:.8125rem;font-weight:500;color:#94a3b8;text-decoration:none;margin-bottom:1.5rem;transition:color .15s;}
    .back-link:hover{color:#3391ff;}
    .back-link svg{width:1rem;height:1rem;}

    /* Hospital Header */
    .hospital-header{margin-bottom:2rem;}
    .hospital-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.75rem;flex-wrap:wrap;}
    .hospital-name{font-size:1.75rem;font-weight:800;color:#1a1a2e;letter-spacing:-.02em;}
    .hospital-type-badge{display:inline-flex;align-items:center;padding:.3125rem .875rem;border-radius:2rem;font-size:.75rem;font-weight:600;background:#eff6ff;color:#3391ff;border:1px solid #bfdbfe;white-space:nowrap;margin-left:.75rem;}
    .hospital-addr{font-size:.9375rem;color:#64748b;margin-bottom:1rem;display:flex;align-items:center;gap:.375rem;}
    .hospital-addr svg{width:1rem;height:1rem;color:#94a3b8;flex-shrink:0;}
    .hospital-badges{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem;}
    .h-badge{display:inline-flex;align-items:center;gap:.375rem;padding:.375rem .75rem;border:1px solid #e2e8f0;border-radius:2rem;font-size:.75rem;font-weight:500;color:#475569;}
    .h-badge svg{width:.875rem;height:.875rem;}
    .h-badge.jci{border-color:#bfdbfe;background:#f0f7ff;color:#1d4ed8;}
    .h-badge.jci svg{color:#3391ff;}
    .h-badge.gov{border-color:#bbf7d0;background:#f0fdf4;color:#15803d;}
    .h-badge.gov svg{color:#22c55e;}
    .h-badge.open{border-color:#bbf7d0;background:#f0fdf4;color:#15803d;}
    .h-badge.open svg{color:#22c55e;}

    /* Contact Buttons */
    .contact-btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;}
    .contact-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.5625rem 1.125rem;border:1px solid #e2e8f0;border-radius:.5rem;font-size:.8125rem;font-weight:600;cursor:pointer;transition:all .15s;background:#fff;color:#475569;font-family:inherit;text-decoration:none;}
    .contact-btn:hover{background:#f8fafc;border-color:#cbd5e1;}
    .contact-btn svg{width:1rem;height:1rem;}
    .contact-btn.whatsapp{background:#25d366;color:#fff;border-color:#25d366;}
    .contact-btn.whatsapp:hover{background:#20bd5a;}
    .contact-btn.email{background:#3391ff;color:#fff;border-color:#3391ff;}
    .contact-btn.email:hover{background:#2577e0;}

    /* Tabs */
    .tabs{display:flex;gap:0;border-bottom:2px solid #f1f5f9;margin-bottom:2rem;}
    .tab{padding:.875rem 1.5rem;font-size:.875rem;font-weight:600;color:#94a3b8;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
    .tab:hover{color:#475569;}
    .tab.active{color:#3391ff;border-bottom-color:#3391ff;}

    /* Tab Content */
    .tab-content{display:none;}
    .tab-content.active{display:block;}

    /* Info Grid */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem 2.5rem;margin-bottom:2rem;}
    .info-item{}
    .info-label{font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.375rem;}
    .info-value{font-size:.9375rem;font-weight:500;color:#1a1a2e;}

    /* Description */
    .desc-box{font-size:.9375rem;color:#475569;line-height:1.75;margin-bottom:2rem;padding:1.25rem 1.5rem;background:#f8fafc;border-radius:.75rem;border:1px solid #f1f5f9;}

    /* Language tags */
    .lang-tags{display:flex;flex-wrap:wrap;gap:.375rem;}
    .lang-tag{padding:.25rem .75rem;border-radius:2rem;font-size:.75rem;font-weight:500;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}

    /* Images placeholder */
    .images-row{display:flex;gap:.75rem;margin-top:1.5rem;}
    .img-placeholder{flex:1;height:160px;background:#f1f5f9;border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:.8125rem;color:#94a3b8;border:1px dashed #e2e8f0;}

    /* Department List */
    .dept-list{display:flex;flex-direction:column;gap:0;}
    .dept-card{border:1px solid #f1f5f9;border-radius:.75rem;margin-bottom:.75rem;overflow:hidden;transition:border-color .15s;}
    .dept-card:hover{border-color:#e2e8f0;}
    .dept-card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;cursor:pointer;transition:background .1s;}
    .dept-card-header:hover{background:#f8fafc;}
    .dept-card-name{font-size:.9375rem;font-weight:600;color:#1a1a2e;}
    .dept-card-count{font-size:.8125rem;color:#94a3b8;font-weight:500;display:flex;align-items:center;gap:.375rem;}
    .dept-card-count svg{width:1rem;height:1rem;transition:transform .2s;}
    .dept-card.open .dept-card-count svg{transform:rotate(180deg);}
    .dept-card-body{display:none;padding:0 1.25rem 1rem;border-top:1px solid #f8fafc;}
    .dept-card.open .dept-card-body{display:block;}
    .doctor-row{display:flex;align-items:center;gap:.75rem;padding:.625rem 0;border-bottom:1px solid #f8fafc;}
    .doctor-row:last-child{border-bottom:none;}
    .doctor-avatar{width:2rem;height:2rem;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#93c5fd);display:flex;align-items:center;justify-content:center;font-size:.625rem;font-weight:700;color:#2563eb;flex-shrink:0;}
    .doctor-name{font-size:.875rem;font-weight:500;color:#1a1a2e;}

    /* International Center */
    .center-card{background:#f8fafc;border:1px solid #f1f5f9;border-radius:.75rem;padding:1.5rem 2rem;}
    .center-title{font-size:1.125rem;font-weight:700;color:#1a1a2e;margin-bottom:1.25rem;}
    .center-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem 2.5rem;}
    .center-item{}
    .center-label{font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.25rem;}
    .center-value{font-size:.9375rem;font-weight:500;color:#1a1a2e;}
    .center-value a{color:#3391ff;text-decoration:none;}
    .center-value a:hover{text-decoration:underline;}

    /* Bottom CTA */
    .bottom-cta{margin-top:3rem;padding-top:2rem;border-top:1px solid #f1f5f9;text-align:center;}
    .cta-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.875rem 2.5rem;background:#3391ff;color:#fff;border:none;border-radius:.5rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background .15s;font-family:inherit;text-decoration:none;}
    .cta-btn:hover{background:#2577e0;}
    .cta-btn svg{width:1.25rem;height:1.25rem;}

    /* Mobile */
    .mobile-header{display:none;padding:1rem;background:#fff;border-bottom:1px solid #e8ecf1;align-items:center;justify-content:space-between;}
    .mobile-menu-btn{width:2.25rem;height:2.25rem;border:1px solid #e8ecf1;border-radius:.5rem;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .mobile-menu-btn svg{width:1.25rem;height:1.25rem;color:#64748b;}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99;}

    @media(max-width:768px){
      .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:100;transition:left .3s;}
      .sidebar.open{left:0;}
      .sidebar-overlay.show{display:block;}
      .mobile-header{display:flex;}
      .main-inner{padding:1.5rem 1rem 3rem;}
      .hospital-title-row{flex-direction:column;}
      .hospital-name{font-size:1.375rem;}
      .info-grid,.center-grid{grid-template-columns:1fr;}
      .contact-btns{flex-direction:column;}
      .contact-btn{justify-content:center;}
      .tabs{overflow-x:auto;}
      .images-row{flex-direction:column;}
      .img-placeholder{height:120px;}
    }
  </style>
</head>

      }

      let badges='';
      if(h.open) badges+='<span class="h-badge open"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>외국인환자 접수 가능</span>';

          const initials=n.substring(0,1);
          doctors+=`<div class="doctor-row"><div class="doctor-avatar">${initials}</div><div class="doctor-name">${n}</div></div>`;

        deptCards+=`<div class="dept-card" onclick="this.classList.toggle('open')">

            <div class="dept-card-name">${d.dept}</div>

          <div class="tab" onclick="switchTab(2)">국제진료센터</div>
        </div>

        <!-- Tab 1: 기본 정보 -->
        <div class="tab-content active" id="tab0">
          <div class="desc-box">${h.desc}</div>
          <div class="info-grid">
            <div class="info-item"><div class="info-label">병상 수</div><div class="info-value">${h.beds.toLocaleString()}병상</div></div>
            <div class="info-item"><div class="info-label">설립연도</div><div class="info-value">${h.established}년</div></div>

              <div class="center-item"><div class="center-label">이메일</div><div class="center-value"><a href="mailto:${h.email}">${h.email}</a></div></div>
              <div class="center-item"><div class="center-label">WhatsApp</div><div class="center-value"><a href="https://wa.me/${h.whatsapp}" target="_blank">+${h.whatsapp.replace(/^82/,'+82-').replace(/(\d{2})(\d{4})(\d{4})$/,'$1-$2-$3')}</a></div></div>

    function switchTab(idx){
      document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===idx);});
      document.querySelectorAll('.tab-content').forEach((c,i)=>{c.classList.toggle('active',i===idx);});
    }

    function toggleSidebar(){
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }

    render();
  </script>
