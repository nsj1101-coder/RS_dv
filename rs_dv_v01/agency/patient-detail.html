<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환자 상세 - MediW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;background:#f5f7fa;color:#1a1a2e;min-height:100vh;}
    .app{display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:240px;background:#fff;border-right:1px solid #e8ecf1;display:flex;flex-direction:column;flex-shrink:0;}
    .sidebar-logo{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:.625rem;border-bottom:1px solid #e8ecf1;}
    .sidebar-logo-icon{width:2rem;height:2rem;border-radius:.5rem;background:linear-gradient(135deg,#3391ff,#8eceff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.875rem;}
    .sidebar-logo-text{font-size:1.125rem;font-weight:700;color:#1a1a2e;}
    .user-card{margin:1rem 1rem 0;padding:1rem;border:1px solid #e8ecf1;border-radius:.75rem;display:flex;align-items:center;gap:.75rem;}
    .user-avatar{width:2.5rem;height:2.5rem;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#93c5fd);display:flex;align-items:center;justify-content:center;}
    .user-avatar svg{width:1.25rem;height:1.25rem;color:#2563eb;}
    .user-name{font-size:.875rem;font-weight:600;color:#1a1a2e;}
    .user-role-label{font-size:.75rem;color:#3391ff;font-weight:500;}
    .type-switcher{display:flex;gap:.25rem;margin:1rem 1rem 0;padding:.25rem;background:#f0f4f8;border-radius:.5rem;}
    .type-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem;padding:.5rem .25rem;border:none;border-radius:.375rem;background:transparent;cursor:pointer;transition:all .2s;font-size:.625rem;font-weight:500;color:#999;font-family:inherit;}
    .type-btn svg{width:1.125rem;height:1.125rem;color:#999;transition:color .2s;}
    .type-btn:hover{background:#e2e8f0;}
    .type-btn.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);color:#3391ff;}
    .type-btn.active svg{color:#3391ff;}
    .nav-menu{flex:1;padding:1rem 0;margin-top:.5rem;}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.5rem;cursor:pointer;transition:all .15s;color:#8896a6;font-size:.875rem;font-weight:500;border-left:3px solid transparent;text-decoration:none;}
    .nav-item:hover{background:#f5f7fa;color:#1a1a2e;}
    .nav-item.active{background:rgba(51,145,255,.06);color:#3391ff;border-left-color:#3391ff;font-weight:600;}
    .nav-item svg{width:1.25rem;height:1.25rem;flex-shrink:0;}
    .sidebar-footer{padding:1rem 1.5rem;border-top:1px solid #e8ecf1;}
    .logout-btn{display:flex;align-items:center;gap:.75rem;width:100%;padding:.625rem 0;border:none;background:none;cursor:pointer;color:#8896a6;font-size:.875rem;font-weight:500;transition:color .15s;font-family:inherit;}
    .logout-btn:hover{color:#e74c3c;}
    .logout-btn svg{width:1.25rem;height:1.25rem;}

    .main{flex:1;overflow-y:auto;padding:0;background:#fff;}
    .main-inner{max-width:860px;margin:0 auto;padding:2.5rem 2rem 4rem;}

    /* Back link */
    .back-link{display:inline-flex;align-items:center;gap:.375rem;font-size:.8125rem;font-weight:500;color:#94a3b8;text-decoration:none;margin-bottom:1.5rem;transition:color .15s;}
    .back-link:hover{color:#3391ff;}
    .back-link svg{width:1rem;height:1rem;}

    /* Patient Header */
    .patient-header{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:1.5rem;border-bottom:1px solid #f1f5f9;margin-bottom:2rem;}
    .ph-left{display:flex;align-items:center;gap:1rem;}
    .ph-avatar{width:3rem;height:3rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.875rem;font-weight:700;color:#fff;background:#3391ff;flex-shrink:0;}
    .ph-name{font-size:1.375rem;font-weight:700;color:#1a1a2e;margin-bottom:.25rem;}
    .ph-meta{font-size:.875rem;color:#94a3b8;}
    .status{display:inline-flex;align-items:center;padding:.3125rem .75rem;border-radius:2rem;font-size:.75rem;font-weight:600;white-space:nowrap;}
    .status.submitted{background:#eff6ff;color:#3391ff;}
    .status.reviewing{background:#fef3c7;color:#b45309;}
    .status.request{background:#fef2f2;color:#dc2626;}
    .status.hospital-approved{background:#faf5ff;color:#7c3aed;}
    .status.confirming{background:#fff7ed;color:#c2410c;}
    .status.confirmed{background:#d1fae5;color:#047857;}
    .status.withdrawn{background:#f1f5f9;color:#94a3b8;text-decoration:line-through;}

    /* Approval Flow */
    .approval-flow{margin-bottom:2rem;border:1px solid #f1f5f9;border-radius:.75rem;padding:1.5rem;}
    .approval-flow-title{font-size:.9375rem;font-weight:700;color:#1a1a2e;margin-bottom:1.25rem;}
    .flow-steps{display:flex;align-items:flex-start;gap:0;position:relative;}
    .flow-step{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:1;}
    .flow-dot{width:2rem;height:2rem;border-radius:50%;border:2px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:.5rem;transition:all .2s;}
    .flow-dot svg{width:1rem;height:1rem;color:#cbd5e1;}
    .flow-step.done .flow-dot{background:#10b981;border-color:#10b981;}
    .flow-step.done .flow-dot svg{color:#fff;}
    .flow-step.active .flow-dot{background:#3391ff;border-color:#3391ff;box-shadow:0 0 0 4px rgba(51,145,255,.15);}
    .flow-step.active .flow-dot svg{color:#fff;}
    .flow-step.rejected .flow-dot{background:#ef4444;border-color:#ef4444;}
    .flow-step.rejected .flow-dot svg{color:#fff;}
    .flow-label{font-size:.6875rem;font-weight:600;color:#94a3b8;line-height:1.3;}
    .flow-step.done .flow-label{color:#10b981;}
    .flow-step.active .flow-label{color:#3391ff;}
    .flow-step.rejected .flow-label{color:#ef4444;}
    .flow-date{font-size:.625rem;color:#cbd5e1;margin-top:.125rem;}
    .flow-line{position:absolute;top:1rem;left:0;right:0;height:2px;background:#e2e8f0;z-index:0;}
    .flow-line-fill{height:100%;background:#10b981;transition:width .3s;}

    /* Action Box */
    .action-box{border:1px solid #e2e8f0;border-radius:.75rem;padding:1.5rem;margin-bottom:2rem;background:#fafbfc;}
    .action-box.confirm-box{border-color:#7c3aed;background:#faf5ff;}
    .action-box-title{font-size:.9375rem;font-weight:700;color:#1a1a2e;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;}
    .action-box-desc{font-size:.8125rem;color:#64748b;margin-bottom:1rem;line-height:1.5;}
    .action-btns{display:flex;gap:.75rem;flex-wrap:wrap;}
    .btn-confirm{background:#7c3aed;color:#fff;padding:.625rem 1.5rem;}
    .btn-confirm:hover{background:#6d28d9;}
    .btn-withdraw{background:#fff;color:#ef4444;border:1px solid #fecaca;padding:.625rem 1.5rem;}
    .btn-withdraw:hover{background:#fef2f2;}
    .btn-outline{background:#fff;color:#64748b;border:1px solid #e2e8f0;padding:.625rem 1.5rem;}
    .btn-outline:hover{background:#f8fafc;color:#1a1a2e;}

    /* Request Alert */
    .request-alert{background:#fef2f2;border:1px solid #fecaca;border-radius:.75rem;padding:1.25rem 1.5rem;margin-bottom:2rem;}
    .request-alert-title{display:flex;align-items:center;gap:.5rem;font-size:.9375rem;font-weight:700;color:#dc2626;margin-bottom:.75rem;}
    .request-alert-title svg{width:1.125rem;height:1.125rem;}
    .request-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-top:1px solid #fee2e2;}
    .request-item:first-of-type{border-top:none;padding-top:0;}
    .request-num{width:1.375rem;height:1.375rem;border-radius:50%;background:#dc2626;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.625rem;font-weight:700;flex-shrink:0;margin-top:.125rem;}
    .request-text{font-size:.875rem;color:#475569;line-height:1.5;}
    .request-text strong{color:#1a1a2e;}
    .request-date{font-size:.75rem;color:#94a3b8;margin-top:.25rem;}
    .request-actions{margin-top:1rem;display:flex;gap:.75rem;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-size:.875rem;font-weight:600;border-radius:.5rem;border:none;cursor:pointer;transition:all .15s;padding:.6875rem 1.25rem;font-family:inherit;text-decoration:none;}
    .btn-danger{background:#dc2626;color:#fff;}
    .btn-danger:hover{background:#b91c1c;}
    .btn-ghost{background:none;color:#64748b;padding:.6875rem .75rem;}
    .btn-ghost:hover{color:#1a1a2e;}
    .btn-primary{background:#3391ff;color:#fff;}
    .btn-primary:hover{background:#2577e0;}

    /* Info Cards */
    .info-cards{display:flex;flex-direction:column;gap:0;}
    .info-card{border-bottom:1px solid #f1f5f9;}
    .info-card:last-child{border-bottom:none;}
    .info-card-header{display:flex;align-items:center;justify-content:space-between;padding:1.125rem 0;cursor:pointer;transition:color .15s;}
    .info-card-header:hover .ic-title{color:#3391ff;}
    .ic-title{font-size:.9375rem;font-weight:600;color:#1a1a2e;transition:color .15s;}
    .ic-toggle{width:1.25rem;height:1.25rem;color:#cbd5e1;transition:transform .2s;}
    .info-card.open .ic-toggle{transform:rotate(180deg);color:#3391ff;}
    .ic-body{display:none;padding:0 0 1.25rem;animation:fadeIn .2s ease;}
    .info-card.open .ic-body{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

    /* Detail Grid */
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.875rem 2rem;}
    .detail-item{display:flex;flex-direction:column;gap:.25rem;padding:.5rem 0;}
    .detail-item.full{grid-column:1/-1;}
    .di-label{font-size:.75rem;font-weight:500;color:#94a3b8;}
    .di-value{font-size:.875rem;font-weight:500;color:#1a1a2e;}
    .di-value.empty{color:#cbd5e1;font-style:italic;}

    /* Tags */
    .di-tags{display:flex;flex-wrap:wrap;gap:.375rem;}
    .di-tag{padding:.25rem .625rem;border-radius:2rem;font-size:.6875rem;font-weight:600;background:#eff6ff;color:#3391ff;}
    .di-tag.green{background:#d1fae5;color:#047857;}

    /* Upload list */
    .upload-list{display:flex;flex-direction:column;gap:.5rem;}
    .upload-file{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:#f8fafc;border-radius:.5rem;font-size:.8125rem;color:#475569;}
    .upload-file svg{width:1rem;height:1rem;color:#3391ff;flex-shrink:0;}

    /* Mobile */
    .mobile-header{display:none;padding:1rem;background:#fff;border-bottom:1px solid #e8ecf1;align-items:center;justify-content:space-between;}
    .mobile-menu-btn{width:2.25rem;height:2.25rem;border:1px solid #e8ecf1;border-radius:.5rem;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .mobile-menu-btn svg{width:1.25rem;height:1.25rem;color:#64748b;}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99;}
    @media(max-width:768px){
      .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:100;transition:left .3s;}
      .sidebar.open{left:0;}.sidebar-overlay.show{display:block;}
      .mobile-header{display:flex;}.main-inner{padding:1.5rem 1rem 3rem;}
      .detail-grid{grid-template-columns:1fr;}.patient-header{flex-direction:column;gap:1rem;}
    }
  </style>
</head>

        step1:{name:'Мария Иванова',nationality:'러시아',phone:'+7-916-987-6543',email:'m.ivanova@yandex.ru'},
        step2:{diagnosis:'유방암 2기 (Stage II Breast Cancer)',hospital_local:'National Cancer Center, Moscow',treatment:'항암치료 완료',meds:'Tamoxifen 20mg, 1일 1회',diseases:['없음'],allergies:'페니실린',visitDate:'2026-04-20',stay:'1~3개월',concierge:['공항 픽업','차량 서비스','숙박 예약','통역 서비스'],files:['Diagnosis_Report.pdf','CT_chest.dcm','Pathology_Report.pdf','Prescription.pdf']},
        requests:[],
        flow:{submitted:'2026-03-10',reviewing:'2026-03-11',hospitalApproved:'2026-03-13',confirmed:'2026-03-16'}},
      3: {name:'Алексей Козлов',country:'카자흐스탄',dept:'심장내과',status:'confirming',statusText:'최종 확인 대기',date:'2026-03-15',hospital:'서울대학교병원',
        step1:{name:'Алексей Козлов',nationality:'카자흐스탄',phone:'+7-771-555-0123',email:'a.kozlov@gmail.com'},
        step2:{diagnosis:'관상동맥 협착 (Coronary Artery Stenosis)',hospital_local:'National Research Center, Almaty',treatment:'약물치료 중',meds:'Aspirin 100mg, Atorvastatin 40mg',diseases:['고혈압','당뇨'],allergies:'없음',visitDate:'2026-05-01',stay:'2~4주',concierge:['공항 픽업','통역 서비스'],files:['Diagnosis_Report.pdf','CT_coronary.dcm','Blood_Test.pdf','ECG_Report.pdf']},
        requests:[],
        flow:{submitted:'2026-03-10',reviewing:'2026-03-11',hospitalApproved:'2026-03-14',confirming:'2026-03-15'}},
      6: {name:'田中太郎',country:'일본',dept:'성형외과',status:'hospital-approved',statusText:'병원 승인',date:'2026-03-14',hospital:'강남세브란스병원',
        step1:{name:'田中太郎',nationality:'일본',phone:'+81-90-1234-5678',email:'tanaka@gmail.com'},
        step2:{diagnosis:'안면 비대칭 교정',hospital_local:'Tokyo University Hospital',treatment:'없음',meds:'없음',diseases:['없음'],allergies:'없음',visitDate:'2026-05-10',stay:'1~2주',concierge:['공항 픽업','숙박 예약'],files:['Diagnosis_Report.pdf','CT_face.dcm']},
        requests:[],
        flow:{submitted:'2026-03-08',reviewing:'2026-03-09',hospitalApproved:'2026-03-14'}},
      17: {name:'Елена Попова',country:'러시아',dept:'피부과',status:'withdrawn',statusText:'철회',date:'2026-03-08',hospital:'서울아산병원',
        step1:{name:'Елена Попова',nationality:'러시아',phone:'+7-916-111-2233',email:'e.popova@mail.ru'},
        step2:{diagnosis:'만성 피부염',hospital_local:'Dermatology Center, Moscow',treatment:'연고 치료 중',meds:'Hydrocortisone cream',diseases:['없음'],allergies:'없음',visitDate:'2026-04-01',stay:'1주',concierge:['통역 서비스'],files:['Diagnosis_Report.pdf']},
        requests:[],
        flow:{submitted:'2026-03-04',reviewing:'2026-03-05',hospitalApproved:'2026-03-07',withdrawn:'2026-03-08'},
        withdrawReason:'개인 사정으로 방문 일정 취소'},
    };

    function getPatientId() {
      return parseInt(new URLSearchParams(location.search).get('id')) || 1;
    }

    // Flow step definitions
    const flowDefs = [
      {key:'submitted', label:'접수 완료'},
      {key:'reviewing', label:'검토 중'},
      {key:'hospitalApproved', label:'병원 승인'},
      {key:'confirming', label:'최종 확인'},
      {key:'confirmed', label:'최종 확정'},
    ];

    function buildFlowHtml(p) {
      const f = p.flow || {};
      const isWithdrawn = p.status === 'withdrawn';
      const isRequest = p.status === 'request';

      // Determine which steps are done
      let activeIdx = -1;
      flowDefs.forEach((d,i) => { if (f[d.key]) activeIdx = i; });

      // For request status, active is at reviewing (index 1)
      if (isRequest) activeIdx = 1;

      const fillPct = activeIdx >= 0 ? Math.min(((activeIdx) / (flowDefs.length - 1)) * 100, 100) : 0;

      const steps = flowDefs.map((d,i) => {
        let cls = '';
        let icon = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg>`;
        const date = f[d.key] || '';

        if (isWithdrawn && f.withdrawn && i >= activeIdx) {
          if (i === activeIdx + 1 || (d.key === 'confirming' && f.hospitalApproved)) {
            cls = 'rejected';
            icon = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>`;
          }
        }

        if (!cls) {
          if (i < activeIdx || (i === activeIdx && (p.status === 'confirmed' || f[d.key]))) {
            cls = 'done';
            icon = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.5 12.75l6 6 9-13.5"/></svg>`;
          } else if (i === activeIdx) {
            cls = 'active';
            icon = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>`;
          }
        }

        return `<div class="flow-step ${cls}"><div class="flow-dot">${icon}</div><div class="flow-label">${d.label}</div>${date ? `<div class="flow-date">${date}</div>` : ''}</div>`;
      }).join('');

      return `<div class="approval-flow">
        <div class="approval-flow-title">승인 진행 현황</div>
        <div style="position:relative;">
          <div class="flow-line"><div class="flow-line-fill" style="width:${fillPct}%"></div></div>
          <div class="flow-steps">${steps}</div>
        </div>
      </div>`;
    }

    function buildActionHtml(p, id) {
      // Hospital approved → patient/agency needs to confirm or withdraw
      if (p.status === 'hospital-approved' || p.status === 'confirming') {
        return `<div class="action-box confirm-box">
          <div class="action-box-title">
            <svg width="18" height="18" fill="none" stroke="#7c3aed" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            병원에서 승인하였습니다
          </div>
          <div class="action-box-desc">${p.hospital}에서 환자 접수를 승인했습니다. 진행을 원하시면 <strong>최종 확인</strong>을 눌러주세요. 일정 변경이나 취소가 필요하시면 철회할 수 있습니다.</div>
          <div class="action-btns">
            <button class="btn btn-confirm" onclick="confirmPatient(${id})">최종 확인</button>
            <button class="btn btn-withdraw" onclick="withdrawPatient(${id})">접수 철회</button>
          </div>
        </div>`;
      }

      // Confirmed → show success
      if (p.status === 'confirmed') {
        return `<div class="action-box" style="border-color:#10b981;background:#f0fdf4;">
          <div class="action-box-title">
            <svg width="18" height="18" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            양측 승인 완료 — 최종 확정
          </div>
          <div class="action-box-desc">병원과 환자/에이전시 양측 모두 확인이 완료되었습니다. 방문 일정에 따라 컨시어지 서비스가 준비됩니다.</div>
        </div>`;
      }

      // Withdrawn → show reason
      if (p.status === 'withdrawn') {
        return `<div class="action-box" style="border-color:#fecaca;background:#fef2f2;">
          <div class="action-box-title">
            <svg width="18" height="18" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
            접수 철회됨
          </div>
          <div class="action-box-desc">${p.withdrawReason ? '사유: ' + p.withdrawReason : '환자 또는 에이전시에 의해 접수가 철회되었습니다.'}</div>
        </div>`;
      }

      // Reviewing / submitted → can withdraw
      if (p.status === 'submitted' || p.status === 'reviewing') {
        return `<div class="action-box">
          <div class="action-box-title">접수 진행 중</div>
          <div class="action-box-desc">병원에서 서류를 검토 중입니다. 일정 변경이나 취소가 필요하시면 철회할 수 있습니다.</div>
          <div class="action-btns">
            <button class="btn btn-withdraw" onclick="withdrawPatient(${id})">접수 철회</button>
          </div>
        </div>`;
      }

      return '';
    }

    function confirmPatient(id) {
      if (confirm('최종 확인하시겠습니까? 병원에 최종 확정 안내가 전달됩니다.')) {
        const p = patients[id];
        p.status = 'confirmed';
        p.statusText = '최종 확정';
        p.flow.confirmed = new Date().toISOString().split('T')[0];
        render();
      }
    }

    function withdrawPatient(id) {
      const reason = prompt('철회 사유를 입력해주세요 (선택):');
      if (reason !== null) {
        const p = patients[id];
        p.status = 'withdrawn';
        p.statusText = '철회';
        p.flow.withdrawn = new Date().toISOString().split('T')[0];
        p.withdrawReason = reason || '';
        render();
      }
    }

    function render() {
      const id = getPatientId();
      const p = patients[id];
      if (!p) { document.getElementById('content').innerHTML = '<p>환자를 찾을 수 없습니다.</p>'; return; }

      const initials = p.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
      const statusClass = p.status;

      let requestHtml = '';
      if (p.requests && p.requests.length > 0) {
        const items = p.requests.map((r,i) => `<div class="request-item"><div class="request-num">${i+1}</div><div><div class="request-text">${r.text}</div><div class="request-date">${r.date}</div></div></div>`).join('');
        requestHtml = `<div class="request-alert">
          <div class="request-alert-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>병원 추가 자료 요청 (${p.requests.length}건)</div>
          ${items}
          <div class="request-actions"><a href="patient-intake.html?id=${id}" class="btn btn-danger">자료 보완하기</a></div>
        </div>`;
      }

      const flowHtml = buildFlowHtml(p);
      const actionHtml = buildActionHtml(p, id);

      const s1 = p.step1;
      const s2 = p.step2;

      const conciergeHtml = s2.concierge.map(c=>`<span class="di-tag green">${c}</span>`).join('');
      const filesHtml = s2.files.map(f=>`<div class="upload-file"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>${f}</div>`).join('');
      const diseaseTags = s2.diseases.map(d=>`<span class="di-tag">${d}</span>`).join('');

      document.getElementById('content').innerHTML = `
        <a href="patient-list.html" class="back-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>환자 목록으로</a>

        <div class="patient-header">
          <div class="ph-left">
            <div class="ph-avatar">${initials}</div>
            <div>
              <div class="ph-name">${p.name}</div>
              <div class="ph-meta">${p.country} · ${p.dept} · ${p.hospital} · ${p.date}</div>
            </div>
          </div>
          <span class="status ${statusClass}">${p.statusText}</span>
        </div>

        ${flowHtml}
        ${actionHtml}
        ${requestHtml}

        <div class="info-cards">
          <div class="info-card open">
            <div class="info-card-header" onclick="toggleCard(this)">
              <span class="ic-title">환자 기본 정보</span>
              <svg class="ic-toggle" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="ic-body">
              <div class="detail-grid">
                <div class="detail-item"><div class="di-label">이름</div><div class="di-value">${s1.name}</div></div>
                <div class="detail-item"><div class="di-label">국적</div><div class="di-value">${s1.nationality}</div></div>
                <div class="detail-item"><div class="di-label">전화번호</div><div class="di-value">${s1.phone}</div></div>
                <div class="detail-item"><div class="di-label">이메일</div><div class="di-value">${s1.email}</div></div>
              </div>
            </div>
          </div>

          <div class="info-card">
            <div class="info-card-header" onclick="toggleCard(this)">
              <span class="ic-title">진료 요청 · 현지 진단</span>
              <svg class="ic-toggle" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="ic-body">
              <div class="detail-grid">
                <div class="detail-item"><div class="di-label">희망 병원</div><div class="di-value">${p.hospital}</div></div>
                <div class="detail-item"><div class="di-label">희망 진료과</div><div class="di-value">${p.dept}</div></div>
                <div class="detail-item full"><div class="di-label">현지 진단명</div><div class="di-value">${s2.diagnosis}</div></div>
                <div class="detail-item"><div class="di-label">진단 병원</div><div class="di-value">${s2.hospital_local}</div></div>
                <div class="detail-item"><div class="di-label">현재 치료</div><div class="di-value">${s2.treatment}</div></div>
              </div>
            </div>
          </div>

          <div class="info-card">
            <div class="info-card-header" onclick="toggleCard(this)">
              <span class="ic-title">병력 · 약물</span>
              <svg class="ic-toggle" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="ic-body">
              <div class="detail-grid">
                <div class="detail-item"><div class="di-label">기저 질환</div><div class="di-tags">${diseaseTags}</div></div>
                <div class="detail-item"><div class="di-label">알레르기</div><div class="di-value">${s2.allergies}</div></div>
                <div class="detail-item full"><div class="di-label">복용 약물</div><div class="di-value">${s2.meds}</div></div>
              </div>
            </div>
          </div>

          <div class="info-card">
            <div class="info-card-header" onclick="toggleCard(this)">
              <span class="ic-title">의료 기록 (${s2.files.length}개 파일)</span>
              <svg class="ic-toggle" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="ic-body">
              <div class="upload-list">${filesHtml}</div>
            </div>
          </div>

          <div class="info-card">
            <div class="info-card-header" onclick="toggleCard(this)">
              <span class="ic-title">방문 계획 · 컨시어지</span>
              <svg class="ic-toggle" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="ic-body">
              <div class="detail-grid">
                <div class="detail-item"><div class="di-label">방문 희망일</div><div class="di-value">${s2.visitDate}</div></div>
                <div class="detail-item"><div class="di-label">예상 체류</div><div class="di-value">${s2.stay}</div></div>
                <div class="detail-item full"><div class="di-label">컨시어지</div><div class="di-tags">${conciergeHtml}</div></div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function toggleCard(header) {
      header.closest('.info-card').classList.toggle('open');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }

    render();
  </script>
</body>
