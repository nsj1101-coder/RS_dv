<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 환자 등록 — STEP 2 — MEDI-W 에이전시</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.460.0/font/lucide.css">
  <link rel="stylesheet" href="../assets/agency/css/common.css">
  <script>document.documentElement.classList.add("preload");if(localStorage.getItem("sidebar-collapsed")==="true"){document.documentElement.classList.add("sidebar-collapsed")}</script>
  <style>
    .sidebar-user .su-av{width:36px;height:36px;border-radius:50%;background:var(--fg-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
    .su-name-row{display:flex;align-items:center;gap:6px}
    .su-name{font-size:13px;font-weight:600;color:var(--fg-primary)}
    .su-tag{background:var(--accent-light);color:var(--accent);font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
    .su-mail{font-size:12px;color:var(--fg-muted);margin-top:2px}

    .reg-body{flex:1;overflow-y:auto;padding:28px 40px;display:flex;flex-direction:column;gap:24px}
    .reg-steps{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .reg-step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-muted);font-weight:500}
    .reg-step .rs-num{width:28px;height:28px;border-radius:50%;background:var(--border-light);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--fg-muted)}
    .reg-step.active{color:var(--fg-primary)}
    .reg-step.active .rs-num{background:var(--accent);color:#fff}
    .reg-step.done .rs-num{background:var(--success);color:#fff}
    .reg-arrow{color:var(--border);font-size:14px}
    .reg-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px}
    .reg-card h2{font-size:18px;font-weight:700;color:var(--fg-primary);margin-bottom:4px}
    .reg-card .desc{font-size:13px;color:var(--fg-muted);margin-bottom:20px}
    .reg-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px}
    .reg-form-grid .full{grid-column:1/-1}
    .file-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .file-slot{border:1px dashed var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;color:var(--fg-muted);font-size:12px;cursor:pointer;transition:border-color .15s}
    .file-slot:hover{border-color:var(--accent)}
    .file-slot i{font-size:20px;margin-bottom:4px;display:block}
    .bottom-bar{background:var(--bg-card);border-top:1px solid var(--border);padding:16px 40px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo"><i class="icon-heart-pulse logo-icon"></i><span class="logo-text">MEDI-W</span></a>
    <div class="sidebar-toggle"><button id="sidebarToggle"><i class="icon-panel-left-close"></i></button></div>
    <a href="profile.html" class="sidebar-user">
      <div class="su-av">AD</div>
      <div class="user-info">
        <div class="su-name-row"><span class="su-name">관리자</span><span class="su-tag">에이전시</span></div>
        <div class="su-mail">admin@mediw.co.kr</div>
      </div>
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i class="icon-layout-dashboard nav-icon"></i><span class="nav-label">대시보드</span></a>
      <a href="profile.html" class="nav-item"><i class="icon-user nav-icon"></i><span class="nav-label">내 정보</span></a>
      <a href="patient-list.html" class="nav-item active"><i class="icon-users nav-icon"></i><span class="nav-label">환자 관리</span></a>
      <a href="hospitals.html" class="nav-item"><i class="icon-search nav-icon"></i><span class="nav-label">병원 검색</span></a>
    </nav>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-logout" onclick="openModal('logoutModal')"><i class="icon-log-out logout-icon"></i><span class="logout-label">로그아웃</span></button>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <div class="top-bar-left">
        <h1>새 환자 등록</h1>
        <p>Step 2 / 3 — 의료 정보</p>
      </div>
    </div>

    <div class="reg-body">
      <div class="reg-steps">
        <div class="reg-step done"><div class="rs-num">✓</div><span>기본 정보</span></div>
        <span class="reg-arrow">▸</span>
        <div class="reg-step active"><div class="rs-num">2</div><span>의료 정보</span></div>
        <span class="reg-arrow">▸</span>
        <div class="reg-step"><div class="rs-num">3</div><span>방문 계획</span></div>
      </div>

      <div class="reg-card">
        <h2>의료 정보</h2>
        <div class="desc">현지 진단·병력·의료기록을 입력해 주세요.</div>
        <div class="reg-form-grid">
          <div class="form-group full">
            <label class="form-label">현지 진단명 <span class="required">*</span></label>
            <input class="form-input" placeholder="예: 관상동맥 질환">
          </div>
          <div class="form-group full">
            <label class="form-label">병력 / 수술 이력</label>
            <textarea class="form-input" rows="3" placeholder="과거 질환, 수술 이력 등 주요 병력"></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">복용 중인 약물</label>
            <textarea class="form-input" rows="2" placeholder="약물명 및 용량"></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">알레르기</label>
            <input class="form-input" placeholder="약물/음식/기타">
          </div>
        </div>
      </div>

      <div class="reg-card">
        <h2>의료 기록 업로드</h2>
        <div class="desc">검진 결과·영상·처방전 등 관련 자료를 업로드해 주세요. (선택)</div>
        <div class="file-row">
          <div class="file-slot"><i class="icon-file-text"></i>진단서</div>
          <div class="file-slot"><i class="icon-image"></i>검진 결과</div>
          <div class="file-slot"><i class="icon-camera"></i>영상 기록</div>
          <div class="file-slot"><i class="icon-pill"></i>처방전</div>
          <div class="file-slot"><i class="icon-heart-pulse"></i>심전도</div>
          <div class="file-slot"><i class="icon-flask-conical"></i>혈액검사</div>
          <div class="file-slot"><i class="icon-file"></i>수술 기록</div>
          <div class="file-slot"><i class="icon-folder-plus"></i>기타</div>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <a href="patient-register-step1.html" class="btn btn-secondary"><i class="icon-chevron-left" style="font-size:14px"></i> 이전</a>
      <button class="btn btn-primary" onclick="location.href='patient-register-step3.html'+location.search">다음으로 <i class="icon-chevron-right" style="font-size:14px"></i></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="logoutModal"><div class="modal-content" style="width:400px"><div class="modal-icon" style="background:#F3F4F6"><i class="icon-log-out" style="color:#4B5563;font-size:24px"></i></div><div class="modal-title">로그아웃 하시겠습니까?</div><div class="modal-desc">다시 로그인이 필요합니다.</div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('logoutModal')">취소</button><button class="btn btn-dark" onclick="doLogout()">로그아웃</button></div></div></div>

<script src="../assets/agency/js/common.js"></script>
</body>
</html>
