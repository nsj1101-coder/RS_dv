<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — MediW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/public/css/common.css">
  <style>
    .stepper{display:flex;gap:.5rem;margin-bottom:1.75rem;}
    .step{flex:1;height:4px;border-radius:2px;background:var(--border);}
    .step.active{background:linear-gradient(90deg,#3391ff,#8eceff);}
    .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
    .type-card{padding:1rem 1.125rem;border:1px solid var(--border);border-radius:.625rem;cursor:pointer;background:var(--bg-elevated);transition:var(--transition);}
    .type-card:hover{border-color:var(--border-hover);}
    .type-card.selected{border-color:#3391ff;background:var(--brand-bg);}
    .type-card .t{font-weight:700;font-size:.9375rem;margin-bottom:.25rem;}
    .type-card .d{font-size:.8125rem;color:var(--text-tertiary);}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo"><div class="logo-icon">M</div><span class="logo-text">MediW</span></a>
      <div class="nav-links">
        <a href="about.html">회사 소개</a>
        <a href="support.html">고객센터</a>
        <a href="contact.html">문의</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg></button>
        <a href="login.html" class="btn btn-ghost">로그인</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="container-xs" style="padding-top:2rem;padding-bottom:4rem;max-width:520px;">
      <div class="form-card">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.375rem;">회원가입</h1>
          <p style="font-size:.875rem;color:var(--text-tertiary);" id="stepLabel">Step 1 / 3 — 기본 정보</p>
        </div>

        <div class="stepper"><div class="step active" data-step="1"></div><div class="step" data-step="2"></div><div class="step" data-step="3"></div></div>

        <!-- Step 1: 기본 정보 -->
        <div class="step-panel" data-panel="1">
          <div class="form-group">
            <label class="form-label">이름 <span class="req">*</span></label>
            <input type="text" class="form-input" placeholder="홍길동" required>
          </div>
          <div class="form-group">
            <label class="form-label">이메일 <span class="req">*</span></label>
            <input type="email" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호 <span class="req">*</span></label>
            <input type="password" class="form-input" placeholder="8자 이상">
          </div>
          <div class="form-group">
            <label class="form-label">전화번호</label>
            <input type="tel" class="form-input" placeholder="010-0000-0000">
          </div>
        </div>

        <!-- Step 2: 계정 유형 -->
        <div class="step-panel" data-panel="2" style="display:none;">
          <p style="font-size:.875rem;color:var(--text-tertiary);margin-bottom:1rem;">어떤 유형의 계정으로 가입하시나요?</p>
          <div class="type-grid">
            <div class="type-card selected" data-type="patient"><div class="t">환자 / 보호자</div><div class="d">진료 상담 및 예약</div></div>
            <div class="type-card" data-type="doctor"><div class="t">의료인</div><div class="d">연수 프로그램 참여</div></div>
            <div class="type-card" data-type="agency"><div class="t">에이전시</div><div class="d">환자 송출 파트너</div></div>
            <div class="type-card" data-type="hospital"><div class="t">병원</div><div class="d">의료기관 등록</div></div>
          </div>
        </div>

        <!-- Step 3: 약관 -->
        <div class="step-panel" data-panel="3" style="display:none;">
          <p style="font-size:.875rem;color:var(--text-tertiary);margin-bottom:1rem;">서비스 이용을 위해 아래 약관에 동의해 주세요.</p>
          <div class="form-group">
            <label class="check-row" style="padding:.75rem 0;border-bottom:1px solid var(--border);">
              <input type="checkbox" id="agreeAll"> <strong style="color:var(--text-primary);">전체 동의</strong>
            </label>
            <label class="check-row" style="padding:.625rem 0;"><input type="checkbox" class="agree-item" required> <a href="terms.html" target="_blank" style="color:#3391ff;">이용약관</a> 동의 (필수)</label>
            <label class="check-row" style="padding:.625rem 0;"><input type="checkbox" class="agree-item" required> <a href="privacy.html" target="_blank" style="color:#3391ff;">개인정보처리방침</a> 동의 (필수)</label>
            <label class="check-row" style="padding:.625rem 0;"><input type="checkbox" class="agree-item"> 마케팅 정보 수신 (선택)</label>
          </div>
        </div>

        <div style="display:flex;gap:.625rem;margin-top:1.5rem;">
          <button type="button" id="btnPrev" class="btn btn-ghost btn-lg" style="display:none;flex:1;justify-content:center;" onclick="goStep(-1)">← 이전</button>
          <button type="button" id="btnNext" class="btn btn-primary btn-lg" style="flex:1;justify-content:center;" onclick="goStep(1)">다음 →</button>
          <button type="button" id="btnFinish" class="btn btn-primary btn-lg" style="display:none;flex:1;justify-content:center;" onclick="location.href='login.html'">가입 완료</button>
        </div>

        <p style="text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--text-tertiary);">
          이미 계정이 있으신가요? <a href="login.html" style="color:#3391ff;text-decoration:none;font-weight:600;">로그인</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="about.html">회사 소개</a>
        <a href="contact.html">문의</a>
        <a href="support.html">고객센터</a>
        <a href="privacy.html">개인정보처리방침</a>
        <a href="terms.html">이용약관</a>
      </div>
      <div class="footer-copy">© 2026 MediW. All rights reserved.</div>
    </div>
  </footer>

  <script src="assets/public/js/common.js"></script>
  <script>
    let step = 1;
    const labels = {1:'기본 정보', 2:'계정 유형', 3:'약관 동의'};
    function goStep(dir){
      const next = step + dir;
      if (next < 1 || next > 3) return;
      document.querySelector('[data-panel="'+step+'"]').style.display = 'none';
      document.querySelector('[data-panel="'+next+'"]').style.display = '';
      step = next;
      document.querySelectorAll('.step').forEach(s => s.classList.toggle('active', +s.dataset.step <= step));
      document.getElementById('stepLabel').textContent = 'Step '+step+' / 3 — '+labels[step];
      document.getElementById('btnPrev').style.display = step === 1 ? 'none' : '';
      document.getElementById('btnNext').style.display = step === 3 ? 'none' : '';
      document.getElementById('btnFinish').style.display = step === 3 ? '' : 'none';
    }
    document.querySelectorAll('.type-card').forEach(c => c.addEventListener('click', () => {
      document.querySelectorAll('.type-card').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
    }));
    document.getElementById('agreeAll').addEventListener('change', (e) => {
      document.querySelectorAll('.agree-item').forEach(x => x.checked = e.target.checked);
    });
  </script>
</body>
</html>
