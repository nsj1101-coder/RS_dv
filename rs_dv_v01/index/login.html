</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">M</div>
        <span class="logo-text">MediW</span>
      </a>
      <div class="nav-links">
        <a href="about.html">회사 소개</a>
        <a href="support.html">고객센터</a>

      </div>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>

        <a href="signup.html" class="btn btn-ghost">회원가입</a>

  <main class="page">
    <div class="container-xs" style="padding-top:2.5rem;padding-bottom:4rem;">
      <div class="form-card">
        <div style="text-align:center;margin-bottom:1.75rem;">
          <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.375rem;">다시 오신 것을 환영합니다</h1>
          <p style="font-size:.875rem;color:var(--text-tertiary);">계정에 로그인하세요</p>
        </div>

        <form onsubmit="event.preventDefault();location.href='../agency/dashboard.html';">
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input type="password" class="form-input" placeholder="비밀번호 입력" required>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
            <label class="check-row">
              <input type="checkbox"> 로그인 유지
            </label>
            <a href="#" style="font-size:.8125rem;color:#3391ff;text-decoration:none;font-weight:500;">비밀번호 찾기</a>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">로그인</button>
        </form>

        <div class="or-divider">또는</div>

        <div class="social-row">
          <button class="social-btn">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="social-btn">
            <svg viewBox="0 0 24 24" fill="#3B5998"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>

        <p style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--text-tertiary);">
          계정이 없으신가요? <a href="signup.html" style="color:#3391ff;text-decoration:none;font-weight:600;">회원가입</a>
        </p>
      </div>
    </div>
  </main>
